name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          fetch-depth: 0

      - name: Install Gitleaks
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/gitleaks/gitleaks/releases/download/v8.21.2/gitleaks_8.21.2_linux_x64.tar.gz | tar -xz gitleaks
          sudo install -m 0755 gitleaks /usr/local/bin/gitleaks

      - name: Run Gitleaks
        run: gitleaks detect --source . --no-banner --redact

  financial-data-guard:
    name: Financial data guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run sensitive artifact scan
        run: python scripts/check_sensitive_artifacts.py .

      - name: Run secret pattern scan
        run: python scripts/check_secret_patterns.py .

      - name: Run v1 security contract check
        run: python scripts/check_v1_security_contract.py .

  python-security:
    name: Python supply chain and static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit bandit

      - name: Audit Python dependencies
        run: pip-audit

      - name: Run Bandit
        run: bandit -r apps/api -q -x apps/api/family_finance_os/migrations

  container-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Build Docker image
        run: docker build -t family-finance-os:ci .

      - name: Run Trivy vulnerability scanner
        run: |
          set -euo pipefail
          docker run --rm \
            -v /var/run/docker.sock:/var/run/docker.sock \
            aquasec/trivy:0.58.1 \
            image --severity CRITICAL,HIGH --ignore-unfixed --exit-code 1 family-finance-os:ci

  repo-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0

      - name: Check forbidden tracked artifacts
        shell: bash
        run: |
          set -euo pipefail
          forbidden_regex='(^|/)(\.env(\..*)?|[^/]+\.sqlite3|[^/]+\.db|secrets/|private/|(\.hermes/))$'
          if git ls-files | grep -E "$forbidden_regex"; then
            echo "Forbidden secret, database, or runtime artifact is tracked."
            exit 1
          fi

      - name: Check required agent and security docs
        shell: bash
        run: |
          set -euo pipefail
          test -f AGENTS.md
          test -f SECURITY.md
          test -f docs/data_handling_policy.md
          test -f cursor.md
