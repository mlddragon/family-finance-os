name: Security

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  secret-scan:
    name: Gitleaks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd
        with:
          fetch-depth: 0

      - name: Run Gitleaks
        uses: gitleaks/gitleaks-action@e0c47f4f8be36e29cdc102c57e68cb5cbf0e8d1e
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  financial-data-guard:
    name: Financial data guard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run sensitive artifact scan
        run: python scripts/check_sensitive_artifacts.py .

      - name: Run secret pattern scan
        run: python scripts/check_secret_patterns.py .

      - name: Run v1 security contract check
        run: python scripts/check_v1_security_contract.py .

  python-security:
    name: Python supply chain and static analysis
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: |
          python -m pip install -e ".[dev]"
          python -m pip install pip-audit bandit

      - name: Audit Python dependencies
        run: pip-audit

      - name: Run Bandit
        run: bandit -r apps/api -q -x apps/api/family_finance_os/migrations

  container-scan:
    name: Container image scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Build Docker image
        run: docker build -t family-finance-os:ci .

      - name: Run Trivy vulnerability scanner
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: family-finance-os:ci
          format: table
          exit-code: 1
          severity: CRITICAL,HIGH
          ignore-unfixed: true

  repo-hygiene:
    name: Repository hygiene
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - name: Check forbidden tracked artifacts
        shell: bash
        run: |
          set -euo pipefail
          forbidden_regex='(^|/)(\.env(\..*)?|[^/]+\.sqlite3|[^/]+\.db|secrets/|private/|(\.hermes/))$'
          if git ls-files | grep -E "$forbidden_regex"; then
            echo "Forbidden secret, database, or runtime artifact is tracked."
            exit 1
          fi

      - name: Check required agent and security docs
        shell: bash
        run: |
          set -euo pipefail
          test -f AGENTS.md
          test -f SECURITY.md
          test -f docs/data_handling_policy.md
