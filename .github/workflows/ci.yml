name: CI

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

jobs:
  synthetic-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: apps/web/package-lock.json

      - name: Install Python dependencies
        run: python -m pip install -e ".[dev]"

      - name: Run API and script tests
        run: pytest

      - name: Install web dependencies
        working-directory: apps/web
        run: npm ci

      - name: Audit web dependencies
        working-directory: apps/web
        run: npm audit --audit-level=high

      - name: Run web tests
        working-directory: apps/web
        run: npm test

      - name: Install browser test runtime
        working-directory: apps/web
        run: npx playwright install --with-deps chromium

      - name: Run browser smoke tests
        working-directory: apps/web
        run: npm run test:e2e

      - name: Build web app
        working-directory: apps/web
        run: npm run build

      - name: Build Docker image
        run: docker build .

      - name: Run Docker E2E closed loop
        run: |
          set -euo pipefail
          DATA_ROOT="$(mktemp -d)"
          mkdir -p "$DATA_ROOT"/{inbox,raw,processed,quarantine,database,reports,monthly_close,exports,logs,manifests}
          chmod -R 0777 "$DATA_ROOT"
          export DILLON_FINANCES_DATA_ROOT="$DATA_ROOT"
          export DILLON_FINANCES_HOST_PORT=28081
          export APP_ENV=qa
          export APP_ENV_LABEL="QA synthetic demo"
          export DATASET_KIND=synthetic
          export DEV_MODE=true
          trap 'docker compose -p dillon-ci-qa down >/dev/null 2>&1 || true; chmod -R 0777 "$DATA_ROOT" >/dev/null 2>&1 || true; rm -rf "$DATA_ROOT" >/dev/null 2>&1 || true' EXIT
          docker compose -p dillon-ci-qa up -d --build
          python scripts/run_docker_e2e.py --base-url http://127.0.0.1:28081 --data-root "$DATA_ROOT"
