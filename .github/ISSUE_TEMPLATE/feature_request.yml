name: Feature request
description: Suggest an app, workflow, docs, infrastructure, or operations improvement.
title: "[Feature]: "
labels:
  - enhancement
body:
  - type: markdown
    attributes:
      value: Do not include real financial data, secrets, tokens, account IDs, hostnames, public IPs, private endpoints, recovery keys, SSH keys, or passphrases.
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user, maintainer, or operator need should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: Describe the change and any alternatives.
    validations:
      required: true
  - type: textarea
    id: impact
    attributes:
      label: Security, privacy, data, and operations impact
      description: Note affected data boundaries, permissions, integrations, exports, imports, deployment assumptions, recurring costs, or runbooks.
    validations:
      required: true
  - type: checkboxes
    id: boundary
    attributes:
      label: Data and secret boundary
      options:
        - label: I did not include real financial data, secrets, tokens, account IDs, hostnames, IPs, private endpoints, recovery keys, SSH keys, or passphrases.
          required: true
