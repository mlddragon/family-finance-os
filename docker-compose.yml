services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      DATA_ROOT: /data
      APP_BIND_HOST: 127.0.0.1
      APP_ENV: ${APP_ENV:-personal}
      APP_ENV_LABEL: ${APP_ENV_LABEL:-Personal data}
      DATASET_KIND: ${DATASET_KIND:-personal}
      DEV_MODE: ${DEV_MODE:-false}
    ports:
      - "127.0.0.1:${DILLON_FINANCES_HOST_PORT:-28080}:8080"
    volumes:
      - "${DILLON_FINANCES_DATA_ROOT:-${HOME}/Dillon_Finances_Data}:/data"
    user: "10001:10001"
